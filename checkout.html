<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Crystaline</title>
    <link rel="icon" href="Black_Minimalist_Crystal_Logo-removebg-preview (1).png">
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #ffffff;
            color: #333;
        }

        /* NAVBAR - Matched to brand style */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(202, 202, 204, 0.95);
            padding: 0 30px;
            height: 80px;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        #logo2 {
            height: 100px;
            width: 110px;
            margin-left: 20px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 50px;
            padding-right: 20px;
        }

        .nav-links li a {
            position: relative;
            text-decoration: none;
            color: #0e1118;
            font-size: 16px;
            padding: 5px 0;
            transition: color 0.3s ease;
        }

        .nav-links li a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            left: 0;
            bottom: 0;
            background-color: #5c5a59;
            transition: width 0.3s ease;
        }

        .nav-links li a:hover::after { width: 100%; }
        .nav-links li a:hover { color: #3e4247; cursor: pointer; }

        /* Header / Banner */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .img5 {
            width: 100%;
            height: auto;
            max-height: 450px;
            object-fit: cover;
            display: block;
        }

        .heading {
            padding: 40px 0 20px;
            font-size: 3rem;
            font-family: 'Century', serif;
            text-align: center;
            width: 100%;
            background-color: white;
            color: #000;
        }

        /* Checkout Form Container */
        .contact-container {
            max-width: 600px;
            margin: 40px auto 100px;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(78, 41, 82, 0.15);
            text-align: center;
        }

        .contact-container h2 {
            margin-bottom: 10px;
            color: #3d1b53;
            font-family: 'Century', serif;
            font-size: 2rem;
        }

        .contact-container p {
            color: #666;
            margin-bottom: 30px;
        }

        #logo3 {
            height: 120px;
            width: auto;
            margin-bottom: 20px;
        }

        /* Form Inputs */
        .contact-container input,
        .contact-container textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background: #fdfdfd;
        }

        .contact-container textarea {
            height: 100px;
            resize: none;
        }

        .button5 {
            width: 100%;
            height: 45px;
            background: linear-gradient(135deg, #a37abb, #442a50);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .button5:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(68, 42, 80, 0.3);
        }

        /* Footer - Matched Style */
        .footer {
            background-color: rgba(165, 164, 167, 0.95);
            padding: 60px 5% 25px;
            margin-top: 50px;
        }

        .footer-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo1 {
            height: 100px;
            width: auto;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .footer-bottom {
            text-align: center;
            margin-top: 40px;
            color: #444;
            font-size: 0.9rem;
        }

        /* Responsive */
        .menu-toggle { display: none; font-size: 26px; cursor: pointer; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .menu-toggle { display: block; }
            .heading { font-size: 2rem; }
            .contact-container { margin: 20px; padding: 25px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <img id="logo2" src="Black_Minimalist_Crystal_Logo-removebg-preview (1).png" alt="Crystal Logo">
    <ul class="nav-links" id="navLinks">
        <li><a href="home.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="newarrival.html">New arrival</a></li>
        <li><a href="specialoffer.html">Special offers</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="checkout.html">Checkout</a></li>
    </ul>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</nav>

<header>
    <img class="img5" src="a-sharp-clear-crystal-or-ice-formation-stands-tall-against-a-cool-blue-background-creating-an-abstract-cold-environment-photo.jpg" alt="Checkout Banner">
    <h1 class="heading">Checkout Page</h1>
</header>

<div class="contact-container">
    <h2>Checkout Us</h2>
    <p>Complete your order below.</p>

    <form>
        <img id="logo3" src="Black_Minimalist_Crystal_Logo-removebg-preview (1).png" alt="Brand Logo">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <div style="display: flex; gap: 10px;">
            <input type="text" placeholder="City" style="flex: 1;">
            <input type="text" placeholder="Zipcode" style="flex: 1;">
        </div>
        <input type="text" placeholder="Shipping Address">
        <input type="text" placeholder="Card Number (0000 0000 0000 0000)">
        <input type="text" placeholder="Expiry Date (MM/YY)">
        <textarea placeholder="Order Notes / Details" required></textarea>
        <button class="button5" type="submit">Complete Order</button>
    </form>
</div>

<footer class="footer">
    <div class="footer-container">
        <div class="footer-box">
            <img class="logo1" src="Black_Minimalist_Crystal_Logo-removebg-preview (1).png" alt="Logo">
            <p>Creating modern, clean & elegant web experiences.</p>
        </div>
        <div class="footer-box">
            <h3>Navigation</h3>
            <p>Home | About | Products | Contact</p>
        </div>
        <div class="footer-box">
            <h3>Subscribe</h3>
            <input type="email" placeholder="Your email" style="width:100%; padding:10px; border-radius:5px; border:none; margin-top:10px;">
        </div>
    </div>
    <p class="footer-bottom">© 2026 Crystal UI | All Rights Reserved</p>
</footer>

<script>
function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>
